name: alive_flutter_assessment
description: "A new Flutter project for Alive technical assessment."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2

  # State management
  provider: ^6.1.2

  # UI / assets
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # REST API ready structure
  dio: ^5.7.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
