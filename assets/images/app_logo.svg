<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d5e156;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007d32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Rounded Square -->
  <rect width="512" height="512" rx="120" fill="url(#grad)" />

  <!-- White Wavy Bottom Section -->
  <path d="M -10 522 L -10 440 C 100 440 180 340 256 340 C 332 340 412 440 522 440 L 522 522 Z" fill="white" />

  <!-- "Alive" Text -->
  <text x="256" y="275" font-family="'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif" font-size="155" font-weight="bold" fill="white" text-anchor="middle">Alive</text>

  <!-- Video Camera Icon (Green) -->
  <g transform="translate(176, 375) scale(0.9)">
    <!-- Camera Body -->
    <rect x="0" y="0" width="160" height="110" rx="35" fill="#2E7D32" />
    <!-- Camera Lens/Side -->
    <path d="M 160 35 L 205 10 V 100 L 160 75 Z" fill="#2E7D32" stroke="#2E7D32" stroke-width="8" stroke-linejoin="round" />
    <!-- White Play Triangle -->
    <path d="M 65 30 L 110 55 L 65 80 Z" fill="white" stroke="white" stroke-width="8" stroke-linejoin="round" />
  </g>
</svg>
